<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Document</title>
    <style>
            body{
                background-image:url('formbg.jpg');
                font-family: Verdana, Geneva, Tahoma, sans-serif;

            }
            .regform{
                width:500px;
                margin:250px auto;
                padding:10px 20px 30px;
                background-color: rgba(1,1,1,0.7);
                color:white;
                font-size: 30px;
                border-radius:10px;
                opacity:0;
                animation:fadeInForm 3s ease-in forwards;
            }
            @keyframes fadeInForm{
                from{
                    opacity:0;
                }
                to{
                    opacity:1;
                }
            }
            .regform h3{
                text-align:center;
                color:#e27898;

            }
            .regform .textlabel{
                display:block;
            }
            .input input{
                width:100%;
                font-size: 1.5em;
                border:1px solid #006077;
                box-shadow:2px;
                border-radius:8px;
                padding:5px 10px;
                box-sizing:border-box;
                margin:5px 0px 15px;
            }
            input:focus{
                background-color:aqua;
            }
            .btn{
                text-align: center;
            }
            button{
                background-color:darkgreen;
                font-size: 30px;
                color:white;
                margin-top:20px;
                padding:15px 25px;
                border-radius:8px;
                border:ipx solid #006077;
                box-shadow:2px;
            }
            .radio input{
                transform:scale(1.5);
            }
    </style>
</head>
<body>
    <div class="regform">
        <h3>Sign Up</h3>
        <form action="">
            <div class="input">
                <label class="textlabel" for="username">User Name</label>
                <input type="text" id="name" name="name">
            </div>
            <div class="input">
                <label class="textlabel" for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="input">
                <label class="textlabel" for="password">Password</label>
                <input type="password" id="pwd" name="pwd">
            </div>
            <div class="input">
                <label class="textlabel" for="confirmpassword">Confirm Password</label>
                <input type="password" id="confirmpassword" name="confirmpassword">
            </div>
            <div class="input">
                <label class="textlabel" for="phonenumber">Phone Number</label>
                <input type="tel" id="phonenumber" name="phonenumber">
            </div>
            <div class="radio">
                <input type="radio" name="Gender" id="male" value="male">
                <label for="male">Male</label>
                <input type="radio" name="Gender" id="female" value="female">
                <label for="female">Female</label>  
            </div>
            <div class="btn">
                <button type="submit">Register</button>
            </div>
        </form>
    </div>
</body>
</html>
