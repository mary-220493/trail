<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4. Style Manipulation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Style Manipulation Methods</h1>
        <a href="index.html" class="back-link">Back to Index</a>


        <div class="section">
            <h2>css()</h2>
            <div id="css-box" class="box">Change my colors!</div>
            <button id="btn-css" class="btn">Apply CSS Colors</button>
        </div>


        <div class="section">
            <h2>addClass(), removeClass(), toggleClass(), hasClass()</h2>
            <p id="class-para">Watch my styles change.</p>
            <button id="btn-add-class" class="btn">Add Highlight</button>
            <button id="btn-rem-class" class="btn">Remove Highlight</button>
            <button id="btn-tgl-class" class="btn">Toggle Theme</button>
            <button id="btn-has-class" class="btn">Check if Highlighted</button>
            <p id="has-class-output" class="output-text"></p>
        </div>
    </div>
</body>
</html>
