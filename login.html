<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"poppins",sans-serif;
        }
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height: 100vh;
            background:url('purple1.jpg') no-repeat;
            background-size:cover;
            background-position: center;

        }
        .login{
            width: 420px;
            background:transparent;
            border:4px solid rgba(255,255,255,0.2);
            backdrop-filter:blur(20px);
            box-shadow:0 0 10px rgba(0,0,0,.2);
            color: #fff;
            border-radius:10px;
            padding:30px 40px;
        }
        .login h2{
            font-size: 36px;
            text-align: center;
        }
        .login .input-box{
            width: 100%;
            height: 50px;
            margin:30px 0;
        }
        .input-box input{
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            border:2px solid rgba(255,255,255,0.2);
            border-radius:40px;
            font-size:16px;
            color:#fff;
            padding:20px 45px 20px 20px;
        }
        .input-box input::placeholder{
            color:#fff;
        }
        .login .rem-forgot{
            display:flex;
            justify-content:space-between;
            font-size:14.5px;
            margin: -15px 0 15px;
        }
        .rem-forgot label input{
            accent-color: #fff;
            margin-right:3px;
        }
        .rem-forgot a{
            color:#fff;
            text-decoration: none;
        }
        .rem-forgot a:hover{
            text-decoration: underline;
        }
        .login .btn{
            width: 100%;
            height: 45px;
            background: #fff;
            border:none;
            outline:none;
            border-radius:40px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
            cursor:pointer;
            font-size:16px;
            color:#333;
            font-weight:600;
        }
        .login .reg-link{
            font-size:14.5px;
            text-align:center;
            margin-top:20px
        }
        .reg-link p a{
            color:#fff;
            text-decoration:none;
            font-weight:600;
        }
        .reg-link p a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login">
        <form action="login.php">
            <h2>Login</h2>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="pwd" placeholder="Password" required>
            </div>
            <div class="rem-forgot">
                <label><input type="checkbox" />Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="reg-link">
                <p>Don't have an account? <a href="sign up.html">Register</a></p>
            </div>
        </form>
    </div>
</body>
</html>
